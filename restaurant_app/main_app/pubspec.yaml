name: restaurant_app
description: Cross-platform restaurant management app with admin panel and public web app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3+1
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.1
  image_cropper: ^5.0.1
  flutter_image_compress: ^2.3.0
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  flutter_blue_plus: ^1.32.8
  flutter_local_notifications: ^17.1.2
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.2
  fl_chart: ^0.68.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  go_router: ^14.2.0
  universal_html: ^2.2.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
