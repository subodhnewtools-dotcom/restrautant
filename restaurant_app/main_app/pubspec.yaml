name: restaurant_app
description: A production-ready restaurant management application with offline-first sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Database
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Images
  image_picker: ^1.0.5
  image_cropper: ^5.0.1
  flutter_image_compress: ^2.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # PDF & Printing
  pdf: ^3.10.7
  printing: ^5.11.1
  share_plus: ^7.2.1
  
  # Navigation
  go_router: ^13.0.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^16.3.0
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.2
  universal_html: ^2.2.4
  
  # UI Components
  flutter_svg: ^2.0.9
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  
  # App Icons & Splash
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#E8630A"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter_native_splash:
  color: "#E8630A"
  image: "assets/images/splash_logo.png"
  android: true
  ios: true
  web: true
  windows: true
